name: Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.5.6-noodle.1)'
        required: true
        type: string
  # Uncomment to auto-publish on push to main:
  # push:
  #   branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-server:
    name: Build & Push Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e362a7d2c83 # v6.18.0
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/noodle-gallery-server:${{ inputs.version || github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/noodle-gallery-server:latest
          build-args: |
            DEVICE=cpu
            BUILD_ID=${{ github.run_id }}
            BUILD_SOURCE_REF=${{ github.ref_name }}
            BUILD_SOURCE_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ml:
    name: Build & Push ML (${{ matrix.device }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: cpu
            suffix: ''
          - device: cuda
            suffix: '-cuda'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e362a7d2c83 # v6.18.0
        with:
          context: machine-learning
          file: machine-learning/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/noodle-gallery-ml:${{ inputs.version || github.ref_name }}${{ matrix.suffix }}
            ghcr.io/${{ github.repository_owner }}/noodle-gallery-ml:latest${{ matrix.suffix }}
          build-args: |
            DEVICE=${{ matrix.device }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
